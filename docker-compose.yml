services:
  # HR Reports React Application - Development optimized
  hr-reports-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hr-reports-json-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount entire project directory for hot reload
      - .:/app
      # CRITICAL: Prevent node_modules from being overwritten by host
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_HOST=0.0.0.0
      - WDS_SOCKET_PORT=0
      - FAST_REFRESH=true
      - REACT_APP_ENV=development
      
      # PocketBase configuration
      - REACT_APP_POCKETBASE_URL=http://localhost:8091
      - REACT_APP_USE_POCKETBASE=true
      
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - hr-reports-network

  # PocketBase Database Service - Development optimized  
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: hr-pocketbase-json
    restart: unless-stopped
    command: [
      "--encryptionEnv", "PB_ENCRYPTION_KEY",
      "--hooksDir", "/pb_hooks",
      "--migrationsDir", "/pb_migrations", 
      "--publicDir", "/pb_public",
      "--hooksWatch=true",  # Hot reload for hooks
      "--dev"
    ]
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-hr-reports-json-secure-encrypt32}
    ports:
      - "8091:8090"  # Admin UI and API (mapped to avoid conflicts)
    volumes:
      - pocketbase_data:/pb_data
      - ./pb_migrations:/pb_migrations
      - ./pb_hooks:/pb_hooks:ro  # Read-only for security
      - ./pb_public:/pb_public:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s  # Give PocketBase time to start
    networks:
      - hr-reports-network

  # Optional: Nginx load balancer for production scaling
  nginx-lb:
    image: nginx:alpine
    container_name: hr-reports-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates (if available)
    depends_on:
      - hr-reports-app
    restart: unless-stopped
    networks:
      - hr-reports-network
    profiles:
      - production

  # Optional: PocketBase backup service (runs daily in development)
  pocketbase-backup:
    image: alpine:latest
    container_name: hr-pocketbase-backup
    restart: unless-stopped
    volumes:
      - pocketbase_data:/pb_data:ro  # Read-only access to PocketBase data
      - ./backups:/backups           # Local backup directory
    environment:
      - BACKUP_INTERVAL=86400        # Daily backups (24 hours)
      - BACKUP_RETENTION_DAYS=7      # Keep 7 days of backups
    command: >
      sh -c "
        echo 'PocketBase backup service started - Development mode';
        echo 'Backup interval: $$BACKUP_INTERVAL seconds';
        mkdir -p /backups;
        while true; do
          echo '🔄 Creating PocketBase backup...';
          BACKUP_FILE=\"/backups/pocketbase_backup_$$(date +%Y%m%d_%H%M%S).tar.gz\";
          tar -czf \"$$BACKUP_FILE\" -C /pb_data . 2>/dev/null;
          if [ $$? -eq 0 ]; then
            echo \"✅ Backup created: $$(basename $$BACKUP_FILE)\";
            echo \"📊 Backup size: $$(du -h $$BACKUP_FILE | cut -f1)\";
          else
            echo \"❌ Backup failed\";
          fi;
          
          # Cleanup old backups
          find /backups -name 'pocketbase_backup_*.tar.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete 2>/dev/null;
          
          echo \"⏰ Next backup in $$BACKUP_INTERVAL seconds...\";
          sleep $$BACKUP_INTERVAL;
        done
      "
    depends_on:
      - pocketbase
    networks:
      - hr-reports-network
    profiles:
      - backup  # Optional service, enable with --profile backup

  # Optional: Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: hr-reports-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - hr-reports-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: hr-reports-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - hr-reports-network
    profiles:
      - monitoring

# Named volumes for data persistence
volumes:
  pocketbase_data:
    driver: local
    labels:
      - "app=hr-reports-json"
      - "component=database"
  prometheus_data:
    driver: local
    labels:
      - "app=hr-reports-json"
      - "component=monitoring"
  grafana_data:
    driver: local
    labels:
      - "app=hr-reports-json"
      - "component=monitoring"

# Network configuration
networks:
  hr-reports-network:
    driver: bridge
    labels:
      - "app=hr-reports-json"