version: '3.8'

services:
  hr-reports-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: hr-reports-prod
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hr-reports-network

  # Optional: Add nginx load balancer for scaling
  nginx-lb:
    image: nginx:alpine
    container_name: hr-reports-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates (if available)
    depends_on:
      - hr-reports-app
    restart: unless-stopped
    networks:
      - hr-reports-network
    profiles:
      - production

  # Optional: Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: hr-reports-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - hr-reports-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: hr-reports-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - hr-reports-network
    profiles:
      - monitoring

networks:
  hr-reports-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: