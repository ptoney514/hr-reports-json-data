version: '3.8'

services:
  # PocketBase Database Service - Development optimized
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: hr-pocketbase
    restart: unless-stopped
    command: [
      "--encryptionEnv", "PB_ENCRYPTION_KEY",
      "--hooksDir", "/pb_hooks",
      "--migrationsDir", "/pb_migrations",
      "--publicDir", "/pb_public",
      "--hooksWatch=true",  # Hot reload for hooks
      "--dev"
    ]
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-hr-reports-v2-secure-encrypt-key}
    ports:
      - "8091:8090"  # Admin UI and API (mapped to avoid conflicts)
    volumes:
      - pocketbase_data:/pb_data
      - ./pb_migrations:/pb_migrations
      - ./pb_hooks:/pb_hooks:ro  # Read-only for security
      - ./pb_public:/pb_public:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s  # Give PocketBase time to start
    networks:
      - hr-network

  # HR Reports Frontend Application - Development optimized
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hr-reports-v2
    restart: unless-stopped
    ports:
      - "5173:5173"  # Vite dev server
    volumes:
      - .:/app  # Full source code mounting
      - /app/node_modules  # Prevent node_modules override
      - /app/.git  # Prevent git override
    environment:
      - NODE_ENV=development
      - VITE_APP_MODE=development
      
      # PocketBase configuration
      - VITE_POCKETBASE_URL=http://localhost:8091
      - VITE_USE_POCKETBASE=true
      
      # Development optimizations
      - CHOKIDAR_USEPOLLING=true  # For file watching in containers
      - WATCHPACK_POLLING=true    # For webpack watching
      - FAST_REFRESH=true         # Enable React Fast Refresh
      - GENERATE_SOURCEMAP=true   # Enable source maps
      
      # Hot reloading configuration
      - HMR_HOST=localhost
      - HMR_PORT=5173
      - DOCKER_ENV=true          # Flag for container detection
      
    depends_on:
      pocketbase:
        condition: service_healthy
    stdin_open: true  # Interactive mode
    tty: true        # Pseudo-terminal
    networks:
      - hr-network
    # Development health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Production build service (use with --profile production)
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-reports-prod
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_POCKETBASE_URL=http://pocketbase:8090
      - VITE_APP_MODE=production
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - hr-network
    profiles:
      - production

  # PocketBase backup service (runs daily in development)
  pocketbase-backup:
    image: alpine:latest
    container_name: hr-pocketbase-backup
    restart: unless-stopped
    volumes:
      - pocketbase_data:/pb_data:ro  # Read-only access to PocketBase data
      - ./backups:/backups           # Local backup directory
    environment:
      - BACKUP_INTERVAL=86400        # Daily backups (24 hours)
      - BACKUP_RETENTION_DAYS=7      # Keep 7 days of backups
    command: >
      sh -c "
        echo 'PocketBase backup service started - Development mode';
        echo 'Backup interval: $$BACKUP_INTERVAL seconds';
        mkdir -p /backups;
        while true; do
          echo '🔄 Creating PocketBase backup...';
          BACKUP_FILE=\"/backups/pocketbase_backup_$$(date +%Y%m%d_%H%M%S).tar.gz\";
          tar -czf \"$$BACKUP_FILE\" -C /pb_data . 2>/dev/null;
          if [ $$? -eq 0 ]; then
            echo \"✅ Backup created: $$(basename $$BACKUP_FILE)\";
            echo \"📊 Backup size: $$(du -h $$BACKUP_FILE | cut -f1)\";
          else
            echo \"❌ Backup failed\";
          fi;
          
          # Cleanup old backups
          find /backups -name 'pocketbase_backup_*.tar.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete 2>/dev/null;
          
          echo \"⏰ Next backup in $$BACKUP_INTERVAL seconds...\";
          sleep $$BACKUP_INTERVAL;
        done
      "
    depends_on:
      - pocketbase
    networks:
      - hr-network
    profiles:
      - dev-backup  # Optional service, enable with --profile dev-backup

# Named volumes for data persistence
volumes:
  pocketbase_data:
    driver: local
    # Add labels for easier management
    labels:
      - "app=hr-reports-v2"
      - "component=database"

# Network configuration
networks:
  hr-network:
    driver: bridge
    labels:
      - "app=hr-reports-v2"